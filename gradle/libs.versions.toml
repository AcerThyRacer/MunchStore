# Compose
compose-bom = "2024.12.01"
compose-material3 = "1.3.1"
compose-material-icons = "1.7.6"

# Kotlin
kotlin = "1.9.24"
kotlinx-coroutines = "1.9.0"
kotlinx-serialization = "1.7.3"

# KSP
ksp = "1.9.24-1.0.20"

# Network
retrofit = "2.11.0"
okhttp = "4.12.0"

# Image Loading
coil = "2.7.0"

# Animations
lottie = "6.6.2"
