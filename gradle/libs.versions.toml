espresso-intents = { group = "androidx.test.espresso", name = "espresso-intents", version.ref = "espresso" }
orchestrator = { group = "androidx.test", name = "orchestrator", version.ref = "orchestrator" }
navigation-testing = { group = "androidx.navigation", name = "navigation-testing", version.ref = "androidx-navigation" }

# Debug
leakcanary-android = { group = "com.squareup.leakcanary", name = "leakcanary-android", version.ref = "leakcanary" }

# Wear OS
wear = { group = "androidx.wear", name = "wear", version.ref = "wear" }
wear-compose-foundation = { group = "androidx.wear.compose", name = "compose-foundation", version.ref = "wear-compose-foundation" }
wear-compose-material = { group = "androidx.wear.compose", name = "compose-material", version.ref = "wear-compose-material" }
wear-compose-navigation = { group = "androidx.wear.compose", name = "compose-navigation", version.ref = "wear-compose-navigation" }
