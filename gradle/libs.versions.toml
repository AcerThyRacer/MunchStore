androidx-test-rules = "1.6.1"
androidx-test-ext = "1.2.1"
espresso = "3.6.1"
orchestrator = "1.5.1"

# Wear OS
wear = "1.3.0"
wear-compose-foundation = "1.4.0"
wear-compose-material = "1.4.0"
wear-compose-navigation = "1.4.0"
